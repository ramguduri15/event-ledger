spring.application.name=event-gateway
server.port=8080

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# account-service base URL (overridden in Docker via environment variable)
account.service.base-url=http://localhost:8081

# Actuator — expose metrics and health
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Resilience4j circuit breaker for account-service calls
resilience4j.circuitbreaker.instances.accountService.sliding-window-size=5
resilience4j.circuitbreaker.instances.accountService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.accountService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.accountService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.accountService.register-health-indicator=true
