spring.datasource.url=jdbc:h2:mem:gatewaytestdb;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
account.service.base-url=http://localhost:9090
logging.level.root=WARN
logging.level.com.eventledger=INFO

# Tighter circuit breaker for tests so the window fills quickly
resilience4j.circuitbreaker.instances.accountService.sliding-window-size=5
resilience4j.circuitbreaker.instances.accountService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.accountService.wait-duration-in-open-state=1s
