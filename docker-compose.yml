services:

  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    image: event-ledger/account-service:latest
    container_name: account-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  event-gateway:
    build:
      context: ./event-gateway
      dockerfile: Dockerfile
    image: event-ledger/event-gateway:latest
    container_name: event-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ACCOUNT_SERVICE_BASE_URL: http://account-service:8081
    depends_on:
      account-service:
        condition: service_healthy
